services:
  disablarr:
    image: disablarr:latest
    build: .
    container_name: disablarr
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: unless-stopped
    environment:
      # Use any strong master password. It will be secure hashed via Argon2id
      # to derive your database encryption and frontend authentication tokens.
      - DISABLARR_MASTER_KEY=MyStrongPassword123!
      # Optional: set a base path for reverse proxy subpath deployments
      # e.g., DISABLARR_BASE_PATH=/disablarr
      # - DISABLARR_BASE_PATH=
    ports:
      # Exposes Web UI on the host at port 7812
      - 7812:7812
    volumes:
      - ./data:/app/data
